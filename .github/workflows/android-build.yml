name: Android Build (NDJC • Core-Templates minimal)
run-name: NDJC ${{ inputs.run_id }}

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "NDJC request run id (e.g. ndjc-20251217T193539Z)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_API_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: NDJC | Install status writer
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .github/scripts

          cat > .github/scripts/write-status.js <<'EOF'
          const fs = require("fs");

          function readJson(path, fallback = {}) {
            try {
              return JSON.parse(fs.readFileSync(path, "utf8"));
            } catch {
              return fallback;
            }
          }

          const runId = process.env.RUN_ID || "";
          const statusFile = process.env.STATUS_FILE || "";
          const sourceFile = process.env.SOURCE_FILE || statusFile;

          if (!runId) {
            throw new Error("RUN_ID is required.");
          }

          if (!statusFile) {
            throw new Error("STATUS_FILE is required.");
          }

          const source = readJson(sourceFile, {});
          const current = readJson(statusFile, {});

          const data = {
            runId,
            appName: String(process.env.APP_NAME || current.appName || source.appName || "Untitled App"),
            moduleName: String(process.env.MODULE_NAME || current.moduleName || source.moduleName || source.module || "feature-showcase"),
            uiPackName: String(process.env.UI_PACK_NAME || current.uiPackName || source.uiPackName || source.uiPack || "ui-pack-showcase-greenpink"),
            plan: String(process.env.PLAN_NAME || current.plan || source.plan || "pro"),
            storeId: String(process.env.STORE_ID || current.storeId || source.storeId || ""),
            adminName: String(process.env.ADMIN_NAME || current.adminName || source.adminName || ""),
            status: String(process.env.BUILD_STATUS || current.status || "queued"),
            stage: String(process.env.BUILD_STAGE || current.stage || "queued"),
            step: Number(process.env.BUILD_STEP || current.step || 0),
            message: String(process.env.BUILD_MESSAGE || current.message || ""),
            artifactName: process.env.ARTIFACT_NAME ? String(process.env.ARTIFACT_NAME) : current.artifactName ?? null,
            workflowRunId: process.env.WORKFLOW_RUN_ID ? String(process.env.WORKFLOW_RUN_ID) : current.workflowRunId ?? null,
            workflowStatus: process.env.WORKFLOW_STATUS ? String(process.env.WORKFLOW_STATUS) : current.workflowStatus ?? null,
            workflowConclusion: process.env.WORKFLOW_CONCLUSION ? String(process.env.WORKFLOW_CONCLUSION) : current.workflowConclusion ?? null,
            workflowUrl: process.env.WORKFLOW_URL ? String(process.env.WORKFLOW_URL) : current.workflowUrl ?? null,
            artifactUrl: process.env.ARTIFACT_URL ? String(process.env.ARTIFACT_URL) : current.artifactUrl ?? null,
            downloadUrl: process.env.DOWNLOAD_URL ? String(process.env.DOWNLOAD_URL) : current.downloadUrl ?? null,
            releaseUrl: process.env.RELEASE_URL ? String(process.env.RELEASE_URL) : current.releaseUrl ?? null,
            publicApkUrl: process.env.PUBLIC_APK_URL ? String(process.env.PUBLIC_APK_URL) : current.publicApkUrl ?? null,
            error: process.env.BUILD_ERROR ? String(process.env.BUILD_ERROR) : current.error ?? null,
            failedStep: process.env.FAILED_STEP ? String(process.env.FAILED_STEP) : current.failedStep ?? null,
            updatedAt: new Date().toISOString(),
          };

          fs.writeFileSync(statusFile, JSON.stringify(data, null, 2) + "\n", "utf8");
          EOF

          cat > .github/scripts/publish-status.js <<'EOF'
          const fs = require("fs");

          const statusFile = process.argv[2] || "";
          const token = process.env.GH_API_TOKEN || process.env.GITHUB_TOKEN || "";
          const repository = process.env.GITHUB_REPOSITORY || "";
          const branch = process.env.GITHUB_REF_NAME || "";
          const commitMessage =
            process.env.STATUS_COMMIT_MESSAGE || `NDJC: update ${statusFile}`;

          if (!statusFile) {
            throw new Error("status file path is required.");
          }

          if (!fs.existsSync(statusFile)) {
            throw new Error(`status file does not exist: ${statusFile}`);
          }

          if (!token) {
            throw new Error("GH_API_TOKEN or GITHUB_TOKEN is required.");
          }

          if (!repository.includes("/")) {
            throw new Error("GITHUB_REPOSITORY is invalid.");
          }

          if (!branch) {
            throw new Error("GITHUB_REF_NAME is required.");
          }

          const [owner, repo] = repository.split("/");
          const encodedPath = encodeURIComponent(statusFile).replace(/%2F/g, "/");
          const getUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${encodedPath}?ref=${encodeURIComponent(branch)}`;
          const putUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${encodedPath}`;

          async function githubRequest(url, init = {}) {
            const response = await fetch(url, {
              ...init,
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: "application/vnd.github+json",
                "Content-Type": "application/json",
                ...(init.headers || {}),
              },
            });

            return response;
          }

          function decodeGithubContent(content) {
            return Buffer.from(String(content || "").replace(/\n/g, ""), "base64").toString("utf8");
          }

          function sleep(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
          }

          async function readRemoteFile() {
            const response = await githubRequest(getUrl, { method: "GET" });

            if (response.status === 404) {
              return { sha: null, content: null };
            }

            const data = await response.json();

            if (!response.ok) {
              throw new Error(`failed to read remote status file: ${JSON.stringify(data)}`);
            }

            return {
              sha: typeof data.sha === "string" ? data.sha : null,
              content: typeof data.content === "string" ? decodeGithubContent(data.content) : null,
            };
          }

          async function publish() {
            const localContent = fs.readFileSync(statusFile, "utf8");
            const base64Content = Buffer.from(localContent, "utf8").toString("base64");

            for (let attempt = 1; attempt <= 5; attempt += 1) {
              const remote = await readRemoteFile();

              if (remote.content === localContent) {
                console.log(`[NDJC] status already up to date: ${statusFile}`);
                return;
              }

              const response = await githubRequest(putUrl, {
                method: "PUT",
                body: JSON.stringify({
                  message: commitMessage,
                  content: base64Content,
                  branch,
                  sha: remote.sha || undefined,
                }),
              });

              const text = await response.text();

              if (response.ok) {
                console.log(`[NDJC] published status file on attempt ${attempt}: ${statusFile}`);
                return;
              }

              if (
                (response.status === 409 || response.status === 422 || response.status === 503) &&
                attempt < 5
              ) {
                console.log(
                  `[NDJC] publish conflict on attempt ${attempt}, retrying: ${statusFile}`,
                );
                await sleep(attempt * 1500);
                continue;
              }

              throw new Error(
                `failed to publish status file ${statusFile}: status=${response.status} body=${text}`,
              );
            }

            throw new Error(`failed to publish status file after retries: ${statusFile}`);
          }

          publish().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

      - name: NDJC | Init build status
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          STATUS_FILE="requests/${RUN_ID}/status.json"
          ASSEMBLY_FILE="requests/${RUN_ID}/assembly.local.json"
          REQUEST_FILE="requests/${RUN_ID}/request.json"

          mkdir -p "requests/${RUN_ID}"

          if [ ! -f "$ASSEMBLY_FILE" ] || [ ! -f "$REQUEST_FILE" ]; then
            echo "Missing request payload file."
            echo "ASSEMBLY_FILE=$ASSEMBLY_FILE"
            echo "REQUEST_FILE=$REQUEST_FILE"
            ls -la "requests" || true
            ls -la "requests/${RUN_ID}" || true

            RUN_ID="$RUN_ID" \
            STATUS_FILE="$STATUS_FILE" \
            SOURCE_FILE="$REQUEST_FILE" \
            BUILD_STATUS="failed" \
            BUILD_STAGE="failed" \
            BUILD_STEP="1" \
            BUILD_MESSAGE="Build request files are missing in repository." \
            BUILD_ERROR="Missing request payload file: requests/${RUN_ID}/assembly.local.json or request.json" \
            FAILED_STEP="preparing_request" \
            WORKFLOW_RUN_ID="${{ github.run_id }}" \
            WORKFLOW_STATUS="completed" \
            WORKFLOW_CONCLUSION="failure" \
            WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            node .github/scripts/write-status.js

            STATUS_COMMIT_MESSAGE="NDJC: fail init status for ${RUN_ID}" \
            node .github/scripts/publish-status.js "$STATUS_FILE"

            exit 1
          fi

          APP_NAME="$(node -e "const fs=require('fs'); const p=process.argv[1]; const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.appName || 'Untitled App'));" "$ASSEMBLY_FILE")"
          MODULE_NAME="$(node -e "const fs=require('fs'); const p=process.argv[1]; const j=JSON.parse(fs.readFileSync(p,'utf8')); const arr=Array.isArray(j.modules)?j.modules:[]; process.stdout.write(String(arr[0] || 'feature-showcase'));" "$ASSEMBLY_FILE")"
          UI_PACK_NAME="$(node -e "const fs=require('fs'); const p=process.argv[1]; const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.uiPack || 'ui-pack-showcase-greenpink'));" "$ASSEMBLY_FILE")"
          PLAN_NAME="$(node -e "const fs=require('fs'); const p=process.argv[1]; const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.plan || 'pro'));" "$REQUEST_FILE")"
          STORE_ID="$(node -e "const fs=require('fs'); const p=process.argv[1]; const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.storeId || ''));" "$ASSEMBLY_FILE")"
          ADMIN_NAME="$(node -e "const fs=require('fs'); const p=process.argv[1]; const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.adminName || ''));" "$REQUEST_FILE")"

          RUN_ID="$RUN_ID" \
          STATUS_FILE="$STATUS_FILE" \
          SOURCE_FILE="$REQUEST_FILE" \
          APP_NAME="$APP_NAME" \
          MODULE_NAME="$MODULE_NAME" \
          UI_PACK_NAME="$UI_PACK_NAME" \
          PLAN_NAME="$PLAN_NAME" \
          STORE_ID="$STORE_ID" \
          ADMIN_NAME="$ADMIN_NAME" \
          BUILD_STATUS="running" \
          BUILD_STAGE="preparing_request" \
          BUILD_STEP="1" \
          BUILD_MESSAGE="Preparing build request" \
          WORKFLOW_RUN_ID="${{ github.run_id }}" \
          WORKFLOW_STATUS="in_progress" \
          WORKFLOW_CONCLUSION="" \
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          node .github/scripts/write-status.js

          STATUS_COMMIT_MESSAGE="NDJC: init status for ${RUN_ID}" \
          node .github/scripts/publish-status.js "$STATUS_FILE"

      # 关键：把 requests/<run_id>/assembly.local.json 变成后面脚本会读的 lib/ndjc/assembly.local.json
      - name: NDJC | Materialize request -> lib/ndjc/assembly.local.json
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="${{ inputs.run_id }}"
          SRC="requests/${RUN_ID}/assembly.local.json"
          DST="lib/ndjc/assembly.local.json"

          if [ ! -f "$SRC" ]; then
            echo "Missing request file: $SRC"
            ls -la "requests/${RUN_ID}" || true
            exit 1
          fi

          mkdir -p "$(dirname "$DST")"
          cp -f "$SRC" "$DST"
          echo "Wrote $DST from $SRC"
          ls -la "$DST" || true

      - name: NDJC | Materialize icon -> lib/ndjc/icon.png
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="${{ inputs.run_id }}"
          SRC="requests/${RUN_ID}/icon.png"
          DST="lib/ndjc/icon.png"

          if [ ! -f "$SRC" ]; then
            echo "Missing required icon file: $SRC"
            ls -la "requests/${RUN_ID}" || true
            exit 1
          fi

          mkdir -p "$(dirname "$DST")"
          cp -f "$SRC" "$DST"
          echo "Wrote $DST from $SRC"
          ls -la "$DST" || true

          if ! command -v magick >/dev/null 2>&1 && ! command -v convert >/dev/null 2>&1; then
            echo "[NDJC] Installing ImageMagick..."
            sudo apt-get update -y
            sudo apt-get install -y imagemagick
          fi

          echo "[NDJC] icon file type before convert:"
          file "$DST" || true

          TMP="${DST}.tmp.png"
          if command -v magick >/dev/null 2>&1; then
            magick "$DST" -strip PNG32:"$TMP"
          else
            convert "$DST" -strip PNG32:"$TMP"
          fi

          mv -f "$TMP" "$DST"

          echo "[NDJC] icon file type after convert:"
          file "$DST" || true
          ls -la "$DST" || true
          head -c 8 "$DST" | xxd || true

      - name: NDJC | Update status - processing identity
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          STATUS_FILE="requests/${RUN_ID}/status.json"

          RUN_ID="$RUN_ID" \
          STATUS_FILE="$STATUS_FILE" \
          BUILD_STATUS="running" \
          BUILD_STAGE="processing_identity" \
          BUILD_STEP="2" \
          BUILD_MESSAGE="Processing app identity" \
          node .github/scripts/write-status.js

          STATUS_COMMIT_MESSAGE="NDJC: step2 ${RUN_ID}" \
          node .github/scripts/publish-status.js "$STATUS_FILE"

      - name: NDJC | Update status - matching logic module
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          STATUS_FILE="requests/${RUN_ID}/status.json"

          RUN_ID="$RUN_ID" \
          STATUS_FILE="$STATUS_FILE" \
          BUILD_STATUS="running" \
          BUILD_STAGE="matching_logic_module" \
          BUILD_STEP="3" \
          BUILD_MESSAGE="Matching logic module" \
          node .github/scripts/write-status.js

          STATUS_COMMIT_MESSAGE="NDJC: step3 ${RUN_ID}" \
          node .github/scripts/publish-status.js "$STATUS_FILE"

      - name: NDJC | Core-Templates assembly
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ndjc-assembly.sh

      - name: NDJC | Update status - applying ui pack
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          STATUS_FILE="requests/${RUN_ID}/status.json"

          RUN_ID="$RUN_ID" \
          STATUS_FILE="$STATUS_FILE" \
          BUILD_STATUS="running" \
          BUILD_STAGE="applying_ui_pack" \
          BUILD_STEP="4" \
          BUILD_MESSAGE="Applying UI pack" \
          node .github/scripts/write-status.js

          STATUS_COMMIT_MESSAGE="NDJC: step4 ${RUN_ID}" \
          node .github/scripts/publish-status.js "$STATUS_FILE"

      - name: NDJC | Resolve Firebase credentials
        id: resolve_firebase_credentials
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_NDJC_FREE_01: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NDJC_FREE_01 }}
          FIREBASE_SERVICE_ACCOUNT_NDJC_FREE_02: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NDJC_FREE_02 }}
          FIREBASE_SERVICE_ACCOUNT_NDJC_FREE_03: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NDJC_FREE_03 }}
          FIREBASE_SERVICE_ACCOUNT_NDJC_PAID_01: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NDJC_PAID_01 }}
          FIREBASE_SERVICE_ACCOUNT_NDJC_PAID_02: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NDJC_PAID_02 }}
          FIREBASE_SERVICE_ACCOUNT_NDJC_PAID_03: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NDJC_PAID_03 }}
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          REQUEST_FILE="requests/${RUN_ID}/request.json"

          if [ ! -f "$REQUEST_FILE" ]; then
            echo "::error::Missing $REQUEST_FILE"
            exit 1
          fi

          FIREBASE_PROJECT_ID="$(node -e "const fs=require('fs'); const p=process.argv[1]; const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.firebaseProjectId || '').trim());" "$REQUEST_FILE")"
          FIREBASE_CREDENTIALS_ENV_KEY="$(node -e "const fs=require('fs'); const p=process.argv[1]; const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.firebaseCredentialsEnvKey || '').trim());" "$REQUEST_FILE")"

          if [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "::error::firebaseProjectId missing in $REQUEST_FILE"
            exit 1
          fi

          if [ -z "$FIREBASE_CREDENTIALS_ENV_KEY" ]; then
            echo "::error::firebaseCredentialsEnvKey missing in $REQUEST_FILE"
            exit 1
          fi

          FIREBASE_CREDENTIALS_JSON="${!FIREBASE_CREDENTIALS_ENV_KEY:-}"

          if [ -z "$FIREBASE_CREDENTIALS_JSON" ]; then
            echo "::error::No workflow env value found for $FIREBASE_CREDENTIALS_ENV_KEY"
            exit 1
          fi

          echo "firebase_project_id=$FIREBASE_PROJECT_ID" >> "$GITHUB_OUTPUT"

          {
            echo "credentials_json<<EOF"
            printf '%s\n' "$FIREBASE_CREDENTIALS_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Google Cloud auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ steps.resolve_firebase_credentials.outputs.credentials_json }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: NDJC | Prepare Firebase Config
        shell: bash
        env:
          FIREBASE_PROJECT_ID: ${{ steps.resolve_firebase_credentials.outputs.firebase_project_id }}
        run: |
          set -euo pipefail
          bash scripts/ndjc-prepare-firebase.sh

      - name: Install dependencies (if needed)
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f package.json ]; then
            echo "No package.json, skip node deps"
            exit 0
          fi

          # NDJC APK 构建主链路不依赖 node_modules。
          # 只有当锁文件存在时才安装，避免 npm install 造成不确定性和 registry 问题。
          if [ -f pnpm-lock.yaml ]; then
            corepack enable || true
            pnpm install --frozen-lockfile
          else
            echo "No pnpm-lock.yaml found; skip installing node deps."
            ls -la
          fi

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          
      - name: Debug | show settings.gradle(.kts)
        shell: bash
        run: |
          set -euo pipefail
          echo "===== settings.gradle ====="
          if [ -f settings.gradle ]; then sed -n '1,200p' settings.gradle; else echo "no settings.gradle"; fi
          echo "===== settings.gradle.kts ====="
          if [ -f settings.gradle.kts ]; then sed -n '1,240p' settings.gradle.kts; else echo "no settings.gradle.kts"; fi

      - name: Debug | list projects & tasks
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew projects --no-daemon
          ./gradlew tasks --all --no-daemon | sed -n '1,200p'

      - name: NDJC | Update status - preparing services
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          STATUS_FILE="requests/${RUN_ID}/status.json"

          RUN_ID="$RUN_ID" \
          STATUS_FILE="$STATUS_FILE" \
          BUILD_STATUS="running" \
          BUILD_STAGE="preparing_services" \
          BUILD_STEP="5" \
          BUILD_MESSAGE="Preparing app services and signing" \
          node .github/scripts/write-status.js

          STATUS_COMMIT_MESSAGE="NDJC: step5 ${RUN_ID}" \
          node .github/scripts/publish-status.js "$STATUS_FILE"

      - name: NDJC | Prepare Release Keystore (generate or decode)
        shell: bash
        run: |
          set -euo pipefail
          ASSEMBLY="lib/ndjc/assembly.local.json"

          KS_B64="$(ASSEMBLY="$ASSEMBLY" node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(process.env.ASSEMBLY,'utf8')); process.stdout.write(((j.keystoreBase64||j.signing?.keystoreBase64||'')+'').trim());")"
          KS_PASS="$(ASSEMBLY="$ASSEMBLY" node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(process.env.ASSEMBLY,'utf8')); process.stdout.write(((j.keystorePassword||j.signing?.keystorePassword||'')+'').trim());")"
          KEY_ALIAS="$(ASSEMBLY="$ASSEMBLY" node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(process.env.ASSEMBLY,'utf8')); process.stdout.write(((j.keyAlias||j.signing?.keyAlias||'ndjc_upload')+'').trim());")"
          KEY_PASS="$(ASSEMBLY="$ASSEMBLY" node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(process.env.ASSEMBLY,'utf8')); process.stdout.write(((j.keyPassword||j.signing?.keyPassword||'')+'').trim());")"

          KS_PATH="$GITHUB_WORKSPACE/lib/ndjc/ndjc-upload-keystore.jks"

          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$KS_PATH"
            echo "[NDJC] Using provided keystore from assembly"
            if [ -z "$KS_PASS" ] || [ -z "$KEY_PASS" ]; then
              echo "::error::Keystore provided but password missing (keystorePassword/keyPassword)."
              exit 1
            fi
          else
            echo "[NDJC] No keystore provided; generating a new upload keystore for this build"
            if [ -z "$KS_PASS" ]; then KS_PASS="$(openssl rand -hex 12)"; fi
            if [ -z "$KEY_PASS" ]; then KEY_PASS="$KS_PASS"; fi

            keytool -genkeypair \
              -keystore "$KS_PATH" \
              -storepass "$KS_PASS" \
              -keypass "$KEY_PASS" \
              -alias "$KEY_ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=NDJC, OU=NDJC, O=NDJC, L=NA, ST=NA, C=US"
          fi

          echo "NDJC_KEYSTORE_PATH=$KS_PATH" >> "$GITHUB_ENV"
          echo "NDJC_KEYSTORE_PASSWORD=$KS_PASS" >> "$GITHUB_ENV"
          echo "NDJC_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "NDJC_KEY_PASSWORD=$KEY_PASS" >> "$GITHUB_ENV"

          ls -la "$KS_PATH"

      - name: NDJC | Write publish and handoff docs
        shell: bash
        run: |
          set -euo pipefail

          ASSEMBLY="lib/ndjc/assembly.local.json"

          APP_LABEL="$(ASSEMBLY="$ASSEMBLY" node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(process.env.ASSEMBLY,'utf8')); process.stdout.write(((j.appName||j.app_label||'NDJC App')+'').trim());")"
          PACKAGE_NAME="$(ASSEMBLY="$ASSEMBLY" node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(process.env.ASSEMBLY,'utf8')); process.stdout.write(((j.packageName||j.applicationId||'')+'').trim());")"
          STORE_ID="$(ASSEMBLY="$ASSEMBLY" node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(process.env.ASSEMBLY,'utf8')); process.stdout.write(((j.storeId||j.store_id||'')+'').trim());")"
          MERCHANT_EMAIL="$(ASSEMBLY="$ASSEMBLY" node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(process.env.ASSEMBLY,'utf8')); process.stdout.write(((j.merchantEmail||j.adminName||'')+'').trim());")"
          PRIVACY_URL="$(ASSEMBLY="$ASSEMBLY" node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(process.env.ASSEMBLY,'utf8')); process.stdout.write(((j.privacyUrl||'')+'').trim());")"

          SIGNING_INFO="lib/ndjc/signing-info.txt"
          DATA_SAFETY="lib/ndjc/publish/data-safety.txt"
          REVIEW_NOTES="lib/ndjc/publish/review-notes.txt"
          README_PUBLISH="lib/ndjc/publish/README-PUBLISH.txt"
          PRIVACY_URL_FILE="lib/ndjc/publish/privacy-url.txt"
          HANDOVER_INFO="lib/ndjc/handover-info.txt"

          mkdir -p "lib/ndjc/publish"

          {
            echo "App Signing Information"
            echo
            echo "Package Name:"
            echo "${PACKAGE_NAME}"
            echo
            echo "Keystore File:"
            echo "ndjc-upload-keystore.jks"
            echo
            echo "Key Alias:"
            echo "${NDJC_KEY_ALIAS}"
            echo
            echo "Keystore Password:"
            echo "${NDJC_KEYSTORE_PASSWORD}"
            echo
            echo "Key Password:"
            echo "${NDJC_KEY_PASSWORD}"
            echo
            echo "Important:"
            echo "- This keystore is required to publish updates to this app"
            echo "- Keep this file safe and do not share it publicly"
            echo "- Losing this keystore will prevent you from updating this app on Google Play"
          } > "${SIGNING_INFO}"

          {
            echo "Please review and confirm this matches your app functionality before submitting to Google Play."
            echo
            echo "Data Safety Declaration (Draft)"
            echo
            echo "Data collected:"
            echo
            echo "For all users (no login required):"
            echo "- Messages (chat content between user and business)"
            echo "- App Activity (user interactions such as browsing products and viewing announcements)"
            echo "- Device Information (push notification token, basic device identifiers)"
            echo
            echo "For business accounts (login required):"
            echo "- Contact Info (email address used for login)"
            echo "- Account-related data (business profile, content created in the app)"
            echo
            echo "Purpose of data collection:"
            echo "- App functionality (display products, announcements, and business information)"
            echo "- Communication (chat between customers and business)"
            echo "- Notifications (push notifications for updates and announcements)"
            echo "- Account management (for business users)"
            echo
            echo "Data sharing:"
            echo "- No user data is sold or shared with third parties"
            echo "- Data is only used within the app’s backend services"
            echo
            echo "Data security:"
            echo "- Data is transmitted over secure HTTPS connections"
            echo "- Access is restricted to authorized services and authenticated business users"
            echo
            echo "User control:"
            echo "- Users can choose not to provide personal information"
            echo "- Business users can manage or delete their account data"
            echo "- Users can request data deletion by contacting the business"
            echo
            echo "Notes:"
            echo "- General users are not required to create an account"
            echo "- Business users must log in to access management features"
          } > "${DATA_SAFETY}"

          {
            echo "App Review Notes"
            echo
            echo "⚠ You must fill required fields before submitting to Google Play"
            echo
            echo "App purpose:"
            echo "This app allows local businesses to showcase products or services, communicate with customers, and publish announcements."
            echo
            echo "User roles:"
            echo "- General users (customers): no login required"
            echo "- Business users (merchants): login required to access management features"
            echo
            echo "Core features:"
            echo "- Browse products or services"
            echo "- View business information and announcements"
            echo "- Chat with the business"
            echo "- Business-side management (requires login)"
            echo
            echo "How to test the app (general user):"
            echo "1. Launch the app"
            echo "2. Enter the main store screen"
            echo "3. Browse products or services"
            echo "4. Open a product detail page"
            echo "5. Navigate to the chat section"
            echo "6. Send a message to the business"
            echo "7. View announcements"
            echo
            echo "How to test business features (login required):"
            echo "1. Navigate to the login screen"
            echo "2. Log in using the test account below"
            echo "3. Access the admin/management interface"
            echo "4. Create or edit products"
            echo "5. Send announcements"
            echo
            echo "========================================"
            echo "ACTION REQUIRED (YOU MUST FILL THIS)"
            echo "========================================"
            echo
            echo "Test account (for reviewer):"
            echo "Email: [REPLACE WITH YOUR BUSINESS ACCOUNT EMAIL]"
            echo "Password: [REPLACE WITH YOUR PASSWORD]"
            echo
            echo "Contact:"
            echo "[REPLACE WITH YOUR CONTACT EMAIL]"
            echo
            echo "Privacy Policy:"
            if [ -n "${PRIVACY_URL}" ]; then
              echo "${PRIVACY_URL}"
            else
              echo "[REPLACE WITH YOUR PRIVACY POLICY URL]"
            fi
            echo
            echo "========================================"
            echo
            echo "Notes for reviewer:"
            echo "- General user features are fully accessible without login"
            echo "- Business features are restricted to authenticated accounts"
            echo "- App content is dynamically loaded and may vary depending on configuration"
            echo "- Push notifications may require testing on a real device"
          } > "${REVIEW_NOTES}"

          {
            echo "How to publish your app:"
            echo
            echo "1. Upload the AAB file to Google Play Console"
            echo "2. Fill store listing (app name, description, etc.)"
            echo "3. Complete Data Safety (see data-safety.txt)"
            echo "4. Upload screenshots (at least 2)"
            echo "5. Provide review notes (see review-notes.txt)"
            echo "6. Enter your Privacy Policy URL in Google Play Console"
            echo
            echo "========================================"
            echo "IMPORTANT ACTION REQUIRED"
            echo "========================================"
            echo
            echo "Before submitting your app, you MUST:"
            echo
            echo "1. Open publish/review-notes.txt"
            echo "   - Fill in your test account email and password"
            echo "   - Confirm your contact email"
            echo "   - Confirm your Privacy Policy URL"
            echo
            echo "2. Review publish/data-safety.txt"
            echo "   - Make sure it matches your app functionality"
            echo
            echo "Important:"
            echo "- Do NOT upload APK"
            echo "- Do NOT upload this zip file"
            echo "- Only upload the .aab file"
          } > "${README_PUBLISH}"

          {
            echo "Privacy Policy URL"
            echo
            if [ -n "${PRIVACY_URL}" ]; then
              echo "${PRIVACY_URL}"
            else
              echo "[REPLACE WITH YOUR PRIVACY POLICY URL]"
            fi
            echo
            echo "Important:"
            echo "- This URL must be entered in Google Play Console"
            echo "- It must be publicly accessible"
            echo "- It must not be empty"
          } > "${PRIVACY_URL_FILE}"

          {
            echo "NDJC App Handover Information"
            echo
            echo "This package includes:"
            echo "- App bundle (.aab)"
            echo "- Test build (.apk)"
            echo "- Signing information for this app"
            echo "- Publish guidance materials"
            echo
            echo "Important:"
            echo "This package does NOT include backend project access or push notification project access."
            echo
            echo "Backend / Cloud Data:"
            echo "If you need to continue development with the existing cloud backend and existing business data, please contact the site owner to request backend handover or data export."
            echo
            echo "Push Notifications:"
            echo "If you need to continue using the existing push notification service, please contact the site owner to request push service handover."
            echo
            echo "Included for app inheritance:"
            echo "- Package name"
            echo "- Signing materials for this app"
            echo
            echo "Not included in this package:"
            echo "- Supabase / backend project access"
            echo "- Existing cloud database export"
            echo "- Firebase / push project access"
            echo "- Server environment variables"
            echo
            echo "Store ID:"
            echo "${STORE_ID}"
            echo
            echo "Note:"
            echo "This package allows publishing and updating the app."
            echo "If backend or push services are needed, contact the site owner."
            echo "The business owner must provide test account credentials in review-notes.txt before submission."
          } > "${HANDOVER_INFO}"

          START_HERE="lib/ndjc/START-HERE.txt"

          {
            echo "NDJC App Package - Start Here"
            echo
            echo "This package contains everything you need to:"
            echo
            echo "1. Test your app"
            echo "2. Publish your app to Google Play"
            echo "3. Allow a developer to continue working on your app"
            echo
            echo "--------------------------------------------------"
            echo
            echo "STEP 1 — Test Your App"
            echo
            echo "File:"
            echo "- *.apk"
            echo
            echo "What to do:"
            echo "- Install this file on your Android phone"
            echo "- Check if everything works as expected"
            echo
            echo "--------------------------------------------------"
            echo
            echo "STEP 2 — Publish to Google Play"
            echo
            echo "Folder:"
            echo "- google-play/"
            echo
            echo "Inside you will find:"
            echo "- *.aab (this is the file you upload)"
            echo "- data-safety.txt"
            echo "- review-notes.txt"
            echo "- README-PUBLISH.txt"
            echo "- privacy-url.txt"
            echo
            echo "What to do:"
            echo "1. Go to Google Play Console"
            echo "2. Create a new app"
            echo "3. Upload the .aab file"
            echo "4. Follow instructions in README-PUBLISH.txt"
            echo
            echo "IMPORTANT:"
            echo "Before submitting your app, you MUST:"
            echo
            echo "- Open review-notes.txt"
            echo "  -> Fill in your test account (email + password)"
            echo "  -> Fill in your contact email"
            echo "  -> Confirm your privacy policy URL"
            echo
            echo "- Review data-safety.txt"
            echo "  -> Make sure it matches your app functionality"
            echo
            echo "--------------------------------------------------"
            echo
            echo "STEP 3 — Continue Development (Optional)"
            echo
            echo "Folder:"
            echo "- app-handover/"
            echo
            echo "Use this only if:"
            echo "- You hire a developer"
            echo "- You want to update or rebuild your app in the future"
            echo
            echo "This folder contains:"
            echo "- App signing files (VERY IMPORTANT)"
            echo "- Technical information needed for updates"
            echo
            echo "WARNING:"
            echo "- Do NOT lose these files"
            echo "- Do NOT share them publicly"
            echo
            echo "--------------------------------------------------"
            echo
            echo "IMPORTANT NOTES"
            echo
            echo "- Only upload the .aab file to Google Play"
            echo "- Do NOT upload the APK file"
            echo "- Do NOT upload this zip file"
            echo
            echo "- Your app already includes a Privacy Policy inside the app"
            echo "- You still need to enter the Privacy Policy URL in Google Play"
            echo
            echo "--------------------------------------------------"
            echo
            echo "If you need backend data or push notification access:"
            echo "Contact the site owner."
            echo
            echo "--------------------------------------------------"
            echo
            echo "End of file"
          } > "${START_HERE}"

          echo "[NDJC] Wrote ${SIGNING_INFO}"
          echo "[NDJC] Wrote ${DATA_SAFETY}"
          echo "[NDJC] Wrote ${REVIEW_NOTES}"
          echo "[NDJC] Wrote ${README_PUBLISH}"
          echo "[NDJC] Wrote ${PRIVACY_URL_FILE}"
          echo "[NDJC] Wrote ${HANDOVER_INFO}"
          echo "[NDJC] Wrote ${START_HERE}"

          find lib/ndjc -maxdepth 3 -type f | sort

      - name: NDJC | Update status - building apk
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          STATUS_FILE="requests/${RUN_ID}/status.json"

          RUN_ID="$RUN_ID" \
          STATUS_FILE="$STATUS_FILE" \
          BUILD_STATUS="running" \
          BUILD_STAGE="building_apk" \
          BUILD_STEP="6" \
          BUILD_MESSAGE="Building and packaging APK" \
          node .github/scripts/write-status.js

          STATUS_COMMIT_MESSAGE="NDJC: step6 ${RUN_ID}" \
          node .github/scripts/publish-status.js "$STATUS_FILE"
      - name: Build Release (APK + AAB)
        shell: bash
        run: |
          set -euo pipefail

          rm -rf templates/Core-Templates/app/build
          rm -rf templates/Core-Templates/build

          cd templates/Core-Templates
          chmod +x ./gradlew
          ./gradlew clean assembleRelease bundleRelease --no-daemon

      - name: Rename outputs to user app name (APK + AAB) and prepare artifact name
        shell: bash
        run: |
          set -euo pipefail

          # 读 assembly.local.json 里的 appName（用于文件名）
          APP_NAME_RAW="$(node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('lib/ndjc/assembly.local.json','utf8')); process.stdout.write(((j.appName||j.app_label||'NDJC App')+'').trim());")"

          # 文件名：允许中文，但至少要去掉路径分隔符等危险字符（/ 和 \\ 必须处理）
          SAFE_APK_NAME="$(printf '%s' "$APP_NAME_RAW" | sed 's#[/\\]#_#g')"
          if [ -z "$SAFE_APK_NAME" ]; then SAFE_APK_NAME="NDJC App"; fi

          APK_DIR="templates/Core-Templates/app/build/outputs/apk/release"
          AAB_DIR="templates/Core-Templates/app/build/outputs/bundle/release"

          mapfile -t APK_FILES < <(find "$APK_DIR" -maxdepth 1 -type f -name "*.apk" | sort)
          mapfile -t AAB_FILES < <(find "$AAB_DIR" -maxdepth 1 -type f -name "*.aab" | sort)

          if [ "${#APK_FILES[@]}" -ne 1 ]; then
            echo "Expected exactly 1 APK, found ${#APK_FILES[@]}"
            printf '%s\n' "${APK_FILES[@]}"
            exit 1
          fi

          if [ "${#AAB_FILES[@]}" -ne 1 ]; then
            echo "Expected exactly 1 AAB, found ${#AAB_FILES[@]}"
            printf '%s\n' "${AAB_FILES[@]}"
            exit 1
          fi

          APK_SRC="${APK_FILES[0]}"
          AAB_SRC="${AAB_FILES[0]}"

          APK_OUT="$APK_DIR/${SAFE_APK_NAME}.apk"
          AAB_OUT="$AAB_DIR/${SAFE_APK_NAME}.aab"

          mv -f "$APK_SRC" "$APK_OUT"
          mv -f "$AAB_SRC" "$AAB_OUT"

          # 固定 artifact 名（最终下载到的就是 Think-it-Done-App.zip）
          echo "NDJC_ARTIFACT_NAME=Think-it-Done-App" >> "$GITHUB_ENV"
          echo "NDJC_APK_OUT=$APK_OUT" >> "$GITHUB_ENV"
          echo "NDJC_AAB_OUT=$AAB_OUT" >> "$GITHUB_ENV"

          echo "Renamed APK -> $APK_OUT"
          echo "Renamed AAB -> $AAB_OUT"
          echo "NDJC_APK_OUT=$APK_OUT"
          echo "NDJC_AAB_OUT=$AAB_OUT"
          ls -la "$APK_DIR"
          ls -la "$AAB_DIR"
      - name: NDJC | Collect deliverables
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          PLAN_VALUE="$(node -e "const fs=require('fs'); const p='lib/ndjc/assembly.local.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.plan || j.mode || 'pro').trim().toLowerCase());")"

          APK_FILE_NAME="$(RUN_ID="$RUN_ID" node - <<'NODE'
          const fs = require("fs");

          function readJson(path) {
            try {
              return JSON.parse(fs.readFileSync(path, "utf8"));
            } catch {
              return {};
            }
          }

          const runId = process.env.RUN_ID || "";
          const assembly = readJson("lib/ndjc/assembly.local.json");
          const request = readJson(`requests/${runId}/request.json`);
          const status = readJson(`requests/${runId}/status.json`);

          const raw = String(
            assembly.appName ||
            assembly.app_name ||
            request.appName ||
            request.app_name ||
            status.appName ||
            status.app_name ||
            "NDJC App"
          ).trim();

          const safe = raw
            .replace(/[\\/:*?"<>|]/g, " ")
            .replace(/\s+/g, " ")
            .trim()
            .replace(/ /g, "-");

          process.stdout.write(`${safe || "NDJC-App"}.apk`);
          NODE
          )"

          rm -rf dist
          mkdir -p dist

          cp -f "$NDJC_APK_OUT" "dist/${APK_FILE_NAME}"
          echo "NDJC_PUBLIC_APK_FILE_NAME=${APK_FILE_NAME}" >> "$GITHUB_ENV"

          echo "[NDJC] Final APK file name: ${APK_FILE_NAME}"

          if [ "$PLAN_VALUE" = "free" ] || [ "$PLAN_VALUE" = "trial" ]; then
            echo "[NDJC] Trial build: package APK + TRIAL-README only"

            {
              echo "Think it Done Trial Version"
              echo
              echo "This is a 7-day trial version."
              echo
              echo "To continue using your app after the trial period,"
              echo "please return to the platform and generate a paid version."
            } > dist/TRIAL-README.txt
          else
            echo "[NDJC] Paid build: package full deliverables"

            mkdir -p dist/google-play
            mkdir -p dist/app-handover

            cp -f "$NDJC_AAB_OUT" dist/google-play/ || true
            cp -f lib/ndjc/publish/data-safety.txt dist/google-play/ || true
            cp -f lib/ndjc/publish/review-notes.txt dist/google-play/ || true
            cp -f lib/ndjc/publish/README-PUBLISH.txt dist/google-play/ || true
            cp -f lib/ndjc/publish/privacy-url.txt dist/google-play/ || true

            cp -f lib/ndjc/ndjc-upload-keystore.jks dist/app-handover/ || true
            cp -f lib/ndjc/signing-info.txt dist/app-handover/ || true
            cp -f lib/ndjc/handover-info.txt dist/app-handover/ || true
            cp -f lib/ndjc/START-HERE.txt dist/ || true
          fi

          echo "[NDJC] dist contents:"
          find dist -maxdepth 3 -type f | sort

      - name: Upload Release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Think-it-Done-App
          path: dist/**
          if-no-files-found: error
          retention-days: 1

      - name: NDJC | Prepare GitHub Release assets
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          PLAN_VALUE="$(node -e "const fs=require('fs'); const p='lib/ndjc/assembly.local.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.plan || j.mode || 'pro').trim().toLowerCase());")"
          APK_FILE_NAME="${NDJC_PUBLIC_APK_FILE_NAME}"

          rm -rf release-assets
          mkdir -p release-assets

          RELEASE_TAG="run-${RUN_ID}"
          RELEASE_TITLE="NDJC Build - ${RUN_ID}"
          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${RELEASE_TAG}"
          RELEASE_DOWNLOAD_URL="${{ github.server_url }}/${{ github.repository }}/releases/download/${RELEASE_TAG}/Think-it-Done-App.zip"

          (
            cd dist
            zip -r "../release-assets/Think-it-Done-App.zip" .
          )

          echo "NDJC_RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "NDJC_RELEASE_TITLE=${RELEASE_TITLE}" >> "$GITHUB_ENV"
          echo "NDJC_RELEASE_URL=${RELEASE_URL}" >> "$GITHUB_ENV"
          echo "NDJC_RELEASE_DOWNLOAD_URL=${RELEASE_DOWNLOAD_URL}" >> "$GITHUB_ENV"
          echo "NDJC_PUBLIC_APK_FILE_NAME=${APK_FILE_NAME}" >> "$GITHUB_ENV"

          if [ "$PLAN_VALUE" = "free" ] || [ "$PLAN_VALUE" = "trial" ]; then
            echo "NDJC_PUBLIC_APK_URL=" >> "$GITHUB_ENV"
            echo "[NDJC] Free/trial build: Release only keeps Think-it-Done-App.zip"
          else
            cp -f "dist/${APK_FILE_NAME}" "release-assets/${APK_FILE_NAME}"
            echo "NDJC_PUBLIC_APK_URL=${{ github.server_url }}/${{ github.repository }}/releases/download/${RELEASE_TAG}/${APK_FILE_NAME}" >> "$GITHUB_ENV"
            echo "[NDJC] Paid build: Release keeps Think-it-Done-App.zip + ${APK_FILE_NAME}"
          fi

          echo "[NDJC] release-assets contents:"
          find release-assets -maxdepth 2 -type f | sort

      - name: NDJC | Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="${{ env.NDJC_RELEASE_TAG }}"
          RELEASE_TITLE="${{ env.NDJC_RELEASE_TITLE }}"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* --title "$RELEASE_TITLE" --notes "NDJC build artifacts for ${{ inputs.run_id }}"
          fi

      - name: NDJC | Update status - success
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          STATUS_FILE="requests/${RUN_ID}/status.json"

          RUN_ID="$RUN_ID" \
          STATUS_FILE="$STATUS_FILE" \
          BUILD_STATUS="success" \
          BUILD_STAGE="success" \
          BUILD_STEP="6" \
          BUILD_MESSAGE="Build completed" \
          ARTIFACT_NAME="${{ env.NDJC_ARTIFACT_NAME }}" \
          WORKFLOW_RUN_ID="${{ github.run_id }}" \
          WORKFLOW_STATUS="completed" \
          WORKFLOW_CONCLUSION="success" \
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          ARTIFACT_URL="${{ env.NDJC_RELEASE_URL }}" \
          DOWNLOAD_URL="${{ env.NDJC_RELEASE_DOWNLOAD_URL }}" \
          RELEASE_URL="${{ env.NDJC_RELEASE_URL }}" \
          PUBLIC_APK_URL="${{ env.NDJC_PUBLIC_APK_URL }}" \
          BUILD_ERROR="" \
          FAILED_STEP="" \
          node .github/scripts/write-status.js

          STATUS_COMMIT_MESSAGE="NDJC: success ${RUN_ID}" \
          node .github/scripts/publish-status.js "$STATUS_FILE"

      - name: NDJC | Update status - failed
        if: ${{ failure() }}
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          STATUS_FILE="requests/${RUN_ID}/status.json"

          CURRENT_STEP="1"
          CURRENT_STAGE="preparing_request"

          if [ -f "$STATUS_FILE" ]; then
            CURRENT_STEP="$(node -e "const fs=require('fs'); const p=process.argv[1]; try { const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.step || '1')); } catch { process.stdout.write('1'); }" "$STATUS_FILE")"
            CURRENT_STAGE="$(node -e "const fs=require('fs'); const p=process.argv[1]; try { const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.stage || 'preparing_request')); } catch { process.stdout.write('preparing_request'); }" "$STATUS_FILE")"
          fi

          RUN_ID="$RUN_ID" \
          STATUS_FILE="$STATUS_FILE" \
          BUILD_STATUS="failed" \
          BUILD_STAGE="failed" \
          BUILD_STEP="$CURRENT_STEP" \
          BUILD_MESSAGE="Build failed" \
          BUILD_ERROR="Packaging workflow failed. Check GitHub Actions logs." \
          FAILED_STEP="$CURRENT_STAGE" \
          ARTIFACT_NAME="" \
          WORKFLOW_RUN_ID="${{ github.run_id }}" \
          WORKFLOW_STATUS="completed" \
          WORKFLOW_CONCLUSION="failure" \
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          DOWNLOAD_URL="" \
          node .github/scripts/write-status.js

          STATUS_COMMIT_MESSAGE="NDJC: failed ${RUN_ID}" \
          node .github/scripts/publish-status.js "$STATUS_FILE"


