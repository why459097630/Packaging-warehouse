name: Android Build (NDJC • Core-Templates minimal)

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "NDJC request run id (e.g. ndjc-20251217T193539Z)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: NDJC | Install status writer
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .github/scripts

          cat > .github/scripts/write-status.js <<'EOF'
          const fs = require("fs");

          function readJson(path, fallback = {}) {
            try {
              return JSON.parse(fs.readFileSync(path, "utf8"));
            } catch {
              return fallback;
            }
          }

          const runId = process.env.RUN_ID || "";
          const statusFile = process.env.STATUS_FILE || "";
          const sourceFile = process.env.SOURCE_FILE || statusFile;

          if (!runId) {
            throw new Error("RUN_ID is required.");
          }

          if (!statusFile) {
            throw new Error("STATUS_FILE is required.");
          }

          const source = readJson(sourceFile, {});
          const current = readJson(statusFile, {});

          const data = {
            runId,
            appName: String(process.env.APP_NAME || current.appName || source.appName || "Untitled App"),
            moduleName: String(process.env.MODULE_NAME || current.moduleName || source.moduleName || source.module || "feature-showcase"),
            uiPackName: String(process.env.UI_PACK_NAME || current.uiPackName || source.uiPackName || source.uiPack || "ui-pack-showcase-greenpink"),
            plan: String(process.env.PLAN_NAME || current.plan || source.plan || "pro"),
            storeId: String(process.env.STORE_ID || current.storeId || source.storeId || ""),
            adminName: String(process.env.ADMIN_NAME || current.adminName || source.adminName || ""),
            status: String(process.env.BUILD_STATUS || current.status || "queued"),
            stage: String(process.env.BUILD_STAGE || current.stage || "queued"),
            step: Number(process.env.BUILD_STEP || current.step || 0),
            message: String(process.env.BUILD_MESSAGE || current.message || ""),
            artifactName: process.env.ARTIFACT_NAME ? String(process.env.ARTIFACT_NAME) : current.artifactName ?? null,
            workflowRunId: process.env.WORKFLOW_RUN_ID ? String(process.env.WORKFLOW_RUN_ID) : current.workflowRunId ?? null,
            workflowUrl: process.env.WORKFLOW_URL ? String(process.env.WORKFLOW_URL) : current.workflowUrl ?? null,
            artifactUrl: process.env.ARTIFACT_URL ? String(process.env.ARTIFACT_URL) : current.artifactUrl ?? null,
            downloadUrl: process.env.DOWNLOAD_URL ? String(process.env.DOWNLOAD_URL) : current.downloadUrl ?? null,
            error: process.env.BUILD_ERROR ? String(process.env.BUILD_ERROR) : current.error ?? null,
            failedStep: process.env.FAILED_STEP ? String(process.env.FAILED_STEP) : current.failedStep ?? null,
            updatedAt: new Date().toISOString(),
          };

          fs.writeFileSync(statusFile, JSON.stringify(data, null, 2) + "\n", "utf8");
          EOF

      - name: NDJC | Init build status
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          STATUS_FILE="requests/${RUN_ID}/status.json"
          ASSEMBLY_FILE="requests/${RUN_ID}/assembly.local.json"
          REQUEST_FILE="requests/${RUN_ID}/request.json"

          mkdir -p "requests/${RUN_ID}"

          git config user.name "ndjc-bot"
          git config user.email "ndjc-bot@users.noreply.github.com"

          if [ ! -f "$ASSEMBLY_FILE" ] || [ ! -f "$REQUEST_FILE" ]; then
            echo "Missing request payload file."
            echo "ASSEMBLY_FILE=$ASSEMBLY_FILE"
            echo "REQUEST_FILE=$REQUEST_FILE"
            ls -la "requests" || true
            ls -la "requests/${RUN_ID}" || true

            RUN_ID="$RUN_ID" \
            STATUS_FILE="$STATUS_FILE" \
            SOURCE_FILE="$REQUEST_FILE" \
            BUILD_STATUS="failed" \
            BUILD_STAGE="failed" \
            BUILD_STEP="1" \
            BUILD_MESSAGE="Build request files are missing in repository." \
            BUILD_ERROR="Missing request payload file: requests/${RUN_ID}/assembly.local.json or request.json" \
            FAILED_STEP="preparing_request" \
            node .github/scripts/write-status.js

            git add "$STATUS_FILE"
            git commit -m "NDJC: fail init status for ${RUN_ID}" || echo "no changes"
            git push || true

            exit 1
          fi

          APP_NAME="$(node -e "const fs=require('fs'); const p=process.argv[1]; const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.appName || 'Untitled App'));" "$ASSEMBLY_FILE")"
          MODULE_NAME="$(node -e "const fs=require('fs'); const p=process.argv[1]; const j=JSON.parse(fs.readFileSync(p,'utf8')); const arr=Array.isArray(j.modules)?j.modules:[]; process.stdout.write(String(arr[0] || 'feature-showcase'));" "$ASSEMBLY_FILE")"
          UI_PACK_NAME="$(node -e "const fs=require('fs'); const p=process.argv[1]; const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.uiPack || 'ui-pack-showcase-greenpink'));" "$ASSEMBLY_FILE")"
          PLAN_NAME="$(node -e "const fs=require('fs'); const p=process.argv[1]; const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.plan || 'pro'));" "$REQUEST_FILE")"
          STORE_ID="$(node -e "const fs=require('fs'); const p=process.argv[1]; const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.storeId || ''));" "$ASSEMBLY_FILE")"
          ADMIN_NAME="$(node -e "const fs=require('fs'); const p=process.argv[1]; const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.adminName || ''));" "$REQUEST_FILE")"

          RUN_ID="$RUN_ID" \
          STATUS_FILE="$STATUS_FILE" \
          SOURCE_FILE="$REQUEST_FILE" \
          APP_NAME="$APP_NAME" \
          MODULE_NAME="$MODULE_NAME" \
          UI_PACK_NAME="$UI_PACK_NAME" \
          PLAN_NAME="$PLAN_NAME" \
          STORE_ID="$STORE_ID" \
          ADMIN_NAME="$ADMIN_NAME" \
          BUILD_STATUS="running" \
          BUILD_STAGE="preparing_request" \
          BUILD_STEP="1" \
          BUILD_MESSAGE="Preparing build request" \
          node .github/scripts/write-status.js

          git add "$STATUS_FILE"
          git commit -m "NDJC: init status for ${RUN_ID}" || echo "no changes"
          git push || true

      # 关键：把 requests/<run_id>/assembly.local.json 变成后面脚本会读的 lib/ndjc/assembly.local.json
      - name: NDJC | Materialize request -> lib/ndjc/assembly.local.json
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="${{ inputs.run_id }}"
          SRC="requests/${RUN_ID}/assembly.local.json"
          DST="lib/ndjc/assembly.local.json"

          if [ ! -f "$SRC" ]; then
            echo "Missing request file: $SRC"
            ls -la "requests/${RUN_ID}" || true
            exit 1
          fi

          mkdir -p "$(dirname "$DST")"
          cp -f "$SRC" "$DST"
          echo "Wrote $DST from $SRC"
          ls -la "$DST" || true

      # 可选：把 requests/<run_id>/icon.png 变成 lib/ndjc/icon.png
      - name: NDJC | Materialize icon -> lib/ndjc/icon.png (optional)
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="${{ inputs.run_id }}"
          SRC="requests/${RUN_ID}/icon.png"
          DST="lib/ndjc/icon.png"

          if [ -f "$SRC" ]; then
            mkdir -p "$(dirname "$DST")"
            cp -f "$SRC" "$DST"
            echo "Wrote $DST from $SRC"
            ls -la "$DST" || true

            # --- NDJC: Force-convert to a valid PNG to avoid AAPT2 compile failures ---
            # Ensure ImageMagick exists
            if ! command -v magick >/dev/null 2>&1 && ! command -v convert >/dev/null 2>&1; then
              echo "[NDJC] Installing ImageMagick..."
              sudo apt-get update -y
              sudo apt-get install -y imagemagick
            fi

            echo "[NDJC] icon file type before convert:"
            file "$DST" || true

            TMP="${DST}.tmp.png"
            if command -v magick >/dev/null 2>&1; then
              magick "$DST" -strip PNG32:"$TMP"
            else
              convert "$DST" -strip PNG32:"$TMP"
            fi

            mv -f "$TMP" "$DST"

            echo "[NDJC] icon file type after convert:"
            file "$DST" || true
            ls -la "$DST" || true
            # Quick signature check (must start with 89 50 4E 47)
            head -c 8 "$DST" | xxd || true
          else
            echo "No icon uploaded for $RUN_ID (skip)"
          fi

      - name: NDJC | Update status - processing identity
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          STATUS_FILE="requests/${RUN_ID}/status.json"

          RUN_ID="$RUN_ID" \
          STATUS_FILE="$STATUS_FILE" \
          BUILD_STATUS="running" \
          BUILD_STAGE="processing_identity" \
          BUILD_STEP="2" \
          BUILD_MESSAGE="Processing app identity" \
          node .github/scripts/write-status.js

          git add "$STATUS_FILE"
          git commit -m "NDJC: step2 ${RUN_ID}" || echo "no changes"
          git push || true

      - name: NDJC | Update status - matching logic module
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          STATUS_FILE="requests/${RUN_ID}/status.json"

          RUN_ID="$RUN_ID" \
          STATUS_FILE="$STATUS_FILE" \
          BUILD_STATUS="running" \
          BUILD_STAGE="matching_logic_module" \
          BUILD_STEP="3" \
          BUILD_MESSAGE="Matching logic module" \
          node .github/scripts/write-status.js

          git add "$STATUS_FILE"
          git commit -m "NDJC: step3 ${RUN_ID}" || echo "no changes"
          git push || true

      - name: NDJC | Core-Templates assembly
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ndjc-assembly.sh

      - name: NDJC | Update status - applying ui pack
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          STATUS_FILE="requests/${RUN_ID}/status.json"

          RUN_ID="$RUN_ID" \
          STATUS_FILE="$STATUS_FILE" \
          BUILD_STATUS="running" \
          BUILD_STAGE="applying_ui_pack" \
          BUILD_STEP="4" \
          BUILD_MESSAGE="Applying UI pack" \
          node .github/scripts/write-status.js

          git add "$STATUS_FILE"
          git commit -m "NDJC: step4 ${RUN_ID}" || echo "no changes"
          git push || true

      - name: NDJC | Resolve Firebase credentials
        id: resolve_firebase_credentials
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_NDJC_FREE_01: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NDJC_FREE_01 }}
          FIREBASE_SERVICE_ACCOUNT_NDJC_FREE_02: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NDJC_FREE_02 }}
          FIREBASE_SERVICE_ACCOUNT_NDJC_FREE_03: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NDJC_FREE_03 }}
          FIREBASE_SERVICE_ACCOUNT_NDJC_PAID_01: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NDJC_PAID_01 }}
          FIREBASE_SERVICE_ACCOUNT_NDJC_PAID_02: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NDJC_PAID_02 }}
          FIREBASE_SERVICE_ACCOUNT_NDJC_PAID_03: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NDJC_PAID_03 }}
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          REQUEST_FILE="requests/${RUN_ID}/request.json"

          if [ ! -f "$REQUEST_FILE" ]; then
            echo "::error::Missing $REQUEST_FILE"
            exit 1
          fi

          FIREBASE_PROJECT_ID="$(node -e "const fs=require('fs'); const p=process.argv[1]; const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.firebaseProjectId || '').trim());" "$REQUEST_FILE")"
          FIREBASE_CREDENTIALS_ENV_KEY="$(node -e "const fs=require('fs'); const p=process.argv[1]; const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.firebaseCredentialsEnvKey || '').trim());" "$REQUEST_FILE")"

          if [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "::error::firebaseProjectId missing in $REQUEST_FILE"
            exit 1
          fi

          if [ -z "$FIREBASE_CREDENTIALS_ENV_KEY" ]; then
            echo "::error::firebaseCredentialsEnvKey missing in $REQUEST_FILE"
            exit 1
          fi

          FIREBASE_CREDENTIALS_JSON="${!FIREBASE_CREDENTIALS_ENV_KEY:-}"

          if [ -z "$FIREBASE_CREDENTIALS_JSON" ]; then
            echo "::error::No workflow env value found for $FIREBASE_CREDENTIALS_ENV_KEY"
            exit 1
          fi

          echo "firebase_project_id=$FIREBASE_PROJECT_ID" >> "$GITHUB_OUTPUT"

          {
            echo "credentials_json<<EOF"
            printf '%s\n' "$FIREBASE_CREDENTIALS_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Google Cloud auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ steps.resolve_firebase_credentials.outputs.credentials_json }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: NDJC | Prepare Firebase Config
        shell: bash
        env:
          FIREBASE_PROJECT_ID: ${{ steps.resolve_firebase_credentials.outputs.firebase_project_id }}
        run: |
          set -euo pipefail
          bash scripts/ndjc-prepare-firebase.sh

      - name: Install dependencies (if needed)
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f package.json ]; then
            echo "No package.json, skip node deps"
            exit 0
          fi

          # NDJC APK 构建主链路不依赖 node_modules。
          # 只有当锁文件存在时才安装，避免 npm install 造成不确定性和 registry 问题。
          if [ -f pnpm-lock.yaml ]; then
            corepack enable || true
            pnpm install --frozen-lockfile
          else
            echo "No pnpm-lock.yaml found; skip installing node deps."
            ls -la
          fi

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          
      - name: Debug | show settings.gradle(.kts)
        shell: bash
        run: |
          set -euo pipefail
          echo "===== settings.gradle ====="
          if [ -f settings.gradle ]; then sed -n '1,200p' settings.gradle; else echo "no settings.gradle"; fi
          echo "===== settings.gradle.kts ====="
          if [ -f settings.gradle.kts ]; then sed -n '1,240p' settings.gradle.kts; else echo "no settings.gradle.kts"; fi

      - name: Debug | list projects & tasks
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew projects --no-daemon
          ./gradlew tasks --all --no-daemon | sed -n '1,200p'

      - name: NDJC | Update status - preparing services
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          STATUS_FILE="requests/${RUN_ID}/status.json"

          RUN_ID="$RUN_ID" \
          STATUS_FILE="$STATUS_FILE" \
          BUILD_STATUS="running" \
          BUILD_STAGE="preparing_services" \
          BUILD_STEP="5" \
          BUILD_MESSAGE="Preparing app services and signing" \
          node .github/scripts/write-status.js

          git add "$STATUS_FILE"
          git commit -m "NDJC: step5 ${RUN_ID}" || echo "no changes"
          git push || true

      - name: NDJC | Prepare Release Keystore (generate or decode)
        shell: bash
        run: |
          set -euo pipefail
          ASSEMBLY="lib/ndjc/assembly.local.json"

          KS_B64="$(ASSEMBLY="$ASSEMBLY" node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(process.env.ASSEMBLY,'utf8')); process.stdout.write(((j.keystoreBase64||j.signing?.keystoreBase64||'')+'').trim());")"
          KS_PASS="$(ASSEMBLY="$ASSEMBLY" node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(process.env.ASSEMBLY,'utf8')); process.stdout.write(((j.keystorePassword||j.signing?.keystorePassword||'')+'').trim());")"
          KEY_ALIAS="$(ASSEMBLY="$ASSEMBLY" node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(process.env.ASSEMBLY,'utf8')); process.stdout.write(((j.keyAlias||j.signing?.keyAlias||'ndjc_upload')+'').trim());")"
          KEY_PASS="$(ASSEMBLY="$ASSEMBLY" node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync(process.env.ASSEMBLY,'utf8')); process.stdout.write(((j.keyPassword||j.signing?.keyPassword||'')+'').trim());")"

          KS_PATH="$GITHUB_WORKSPACE/lib/ndjc/ndjc-upload-keystore.jks"

          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$KS_PATH"
            echo "[NDJC] Using provided keystore from assembly"
            if [ -z "$KS_PASS" ] || [ -z "$KEY_PASS" ]; then
              echo "::error::Keystore provided but password missing (keystorePassword/keyPassword)."
              exit 1
            fi
          else
            echo "[NDJC] No keystore provided; generating a new upload keystore for this build"
            if [ -z "$KS_PASS" ]; then KS_PASS="$(openssl rand -hex 12)"; fi
            if [ -z "$KEY_PASS" ]; then KEY_PASS="$KS_PASS"; fi

            keytool -genkeypair \
              -keystore "$KS_PATH" \
              -storepass "$KS_PASS" \
              -keypass "$KEY_PASS" \
              -alias "$KEY_ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=NDJC, OU=NDJC, O=NDJC, L=NA, ST=NA, C=US"
          fi

          echo "NDJC_KEYSTORE_PATH=$KS_PATH" >> "$GITHUB_ENV"
          echo "NDJC_KEYSTORE_PASSWORD=$KS_PASS" >> "$GITHUB_ENV"
          echo "NDJC_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "NDJC_KEY_PASSWORD=$KEY_PASS" >> "$GITHUB_ENV"

          ls -la "$KS_PATH"

      - name: NDJC | Write signing-info.txt (handoff)
        shell: bash
        run: |
          set -euo pipefail

          SIGNING_INFO="lib/ndjc/signing-info.txt"
          PUBLISH_INFO="lib/ndjc/publish-info.txt"

          mkdir -p "lib/ndjc"

          {
            echo "NDJC Signing Info (handoff)"
            echo "- keystoreFile: ndjc-upload-keystore.jks"
            echo "- keystorePath: ${NDJC_KEYSTORE_PATH}"
            echo "- keyAlias: ${NDJC_KEY_ALIAS}"
            echo "- storePassword: ${NDJC_KEYSTORE_PASSWORD}"
            echo "- keyPassword: ${NDJC_KEY_PASSWORD}"
            echo
            echo "Certificate fingerprints:"
            keytool -list -v -keystore "${NDJC_KEYSTORE_PATH}" -storepass "${NDJC_KEYSTORE_PASSWORD}" -alias "${NDJC_KEY_ALIAS}" | sed -n '1,200p'
          } > "${SIGNING_INFO}"

          if [ ! -f "${PUBLISH_INFO}" ]; then
            echo "NDJC Publish Info" > "${PUBLISH_INFO}"
          fi

          {
            echo
            echo "(Signing summary)"
            echo "- keystoreFile: ndjc-upload-keystore.jks"
            echo "- keyAlias: ${NDJC_KEY_ALIAS}"
            echo "- (Passwords in signing-info.txt)"
          } >> "${PUBLISH_INFO}"

          echo "[NDJC] Wrote ${SIGNING_INFO}"
          ls -la "${SIGNING_INFO}" || true

      - name: NDJC | Update status - building apk
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          STATUS_FILE="requests/${RUN_ID}/status.json"

          RUN_ID="$RUN_ID" \
          STATUS_FILE="$STATUS_FILE" \
          BUILD_STATUS="running" \
          BUILD_STAGE="building_apk" \
          BUILD_STEP="6" \
          BUILD_MESSAGE="Building and packaging APK" \
          node .github/scripts/write-status.js

          git add "$STATUS_FILE"
          git commit -m "NDJC: step6 ${RUN_ID}" || echo "no changes"
          git push || true
      - name: Build Release (APK + AAB)
        shell: bash
        run: |
          set -euo pipefail
          cd templates/Core-Templates
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Rename outputs to user app name (APK + AAB) and prepare artifact name
        shell: bash
        run: |
          set -euo pipefail

          # 读 assembly.local.json 里的 appName（用于文件名）
          APP_NAME_RAW="$(node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('lib/ndjc/assembly.local.json','utf8')); process.stdout.write(((j.appName||j.app_label||'NDJC App')+'').trim());")"

          # 文件名：允许中文，但至少要去掉路径分隔符等危险字符（/ 和 \\ 必须处理）
          SAFE_APK_NAME="$(printf '%s' "$APP_NAME_RAW" | sed 's#[/\\]#_#g')"
          if [ -z "$SAFE_APK_NAME" ]; then SAFE_APK_NAME="NDJC App"; fi

          APK_DIR="templates/Core-Templates/app/build/outputs/apk/release"
          APK_SRC="$(ls -1 "$APK_DIR"/*.apk | head -n 1)"
          APK_OUT="$APK_DIR/${SAFE_APK_NAME}.apk"

          AAB_DIR="templates/Core-Templates/app/build/outputs/bundle/release"
          AAB_SRC="$(ls -1 "$AAB_DIR"/*.aab | head -n 1)"
          AAB_OUT="$AAB_DIR/${SAFE_APK_NAME}.aab"

          cp -f "$APK_SRC" "$APK_OUT"
          cp -f "$AAB_SRC" "$AAB_OUT"

          # 固定 artifact 名（最终下载到的就是 NDJC-app.zip）
          echo "NDJC_ARTIFACT_NAME=NDJC-app" >> "$GITHUB_ENV"
          echo "NDJC_APK_OUT=$APK_OUT" >> "$GITHUB_ENV"
          echo "NDJC_AAB_OUT=$AAB_OUT" >> "$GITHUB_ENV"

          echo "Renamed APK -> $APK_OUT"
          echo "Renamed AAB -> $AAB_OUT"
          ls -la "$APK_DIR"
          ls -la "$AAB_DIR"
      - name: NDJC | Collect deliverables (flatten)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          cp -f "${{ env.NDJC_APK_OUT }}" dist/ || true
          cp -f "${{ env.NDJC_AAB_OUT }}" dist/ || true
          cp -f lib/ndjc/ndjc-upload-keystore.jks dist/ || true
          cp -f lib/ndjc/publish-info.txt dist/ || true
          cp -f lib/ndjc/signing-info.txt dist/ || true

          echo "[NDJC] dist contents:"
          ls -la dist

      - name: Upload Release artifacts (APK + AAB + keystore + publish-info)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.NDJC_ARTIFACT_NAME }}
          path: dist/**
          if-no-files-found: error
          retention-days: 14
      - name: NDJC | Update status - success
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          STATUS_FILE="requests/${RUN_ID}/status.json"

          RUN_ID="$RUN_ID" \
          STATUS_FILE="$STATUS_FILE" \
          BUILD_STATUS="success" \
          BUILD_STAGE="success" \
          BUILD_STEP="6" \
          BUILD_MESSAGE="Build completed" \
          ARTIFACT_NAME="${{ env.NDJC_ARTIFACT_NAME }}" \
          WORKFLOW_RUN_ID="${{ github.run_id }}" \
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          DOWNLOAD_URL="/api/download-artifact?runId=${RUN_ID}" \
          BUILD_ERROR="" \
          FAILED_STEP="" \
          node .github/scripts/write-status.js

          git add "$STATUS_FILE"
          git commit -m "NDJC: success ${RUN_ID}" || echo "no changes"
          git push || true

      - name: NDJC | Update status - failed
        if: ${{ failure() }}
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID="${{ inputs.run_id }}"
          STATUS_FILE="requests/${RUN_ID}/status.json"

          CURRENT_STEP="1"
          CURRENT_STAGE="preparing_request"

          if [ -f "$STATUS_FILE" ]; then
            CURRENT_STEP="$(node -e "const fs=require('fs'); const p=process.argv[1]; try { const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.step || '1')); } catch { process.stdout.write('1'); }" "$STATUS_FILE")"
            CURRENT_STAGE="$(node -e "const fs=require('fs'); const p=process.argv[1]; try { const j=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(j.stage || 'preparing_request')); } catch { process.stdout.write('preparing_request'); }" "$STATUS_FILE")"
          fi

          RUN_ID="$RUN_ID" \
          STATUS_FILE="$STATUS_FILE" \
          BUILD_STATUS="failed" \
          BUILD_STAGE="failed" \
          BUILD_STEP="$CURRENT_STEP" \
          BUILD_MESSAGE="Build failed" \
          BUILD_ERROR="Packaging workflow failed. Check GitHub Actions logs." \
          FAILED_STEP="$CURRENT_STAGE" \
          ARTIFACT_NAME="" \
          DOWNLOAD_URL="" \
          node .github/scripts/write-status.js

          git add "$STATUS_FILE"
          git commit -m "NDJC: failed ${RUN_ID}" || echo "no changes"
          git push || true


